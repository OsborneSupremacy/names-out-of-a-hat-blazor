name: Build & Deploy Infrastructure

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build-infrastructure:
    name: Build & Deploy Infrastructure
    uses: ./.github/workflows/.reusable-build-deploy-infrastructure.yml
    with:
      tfstate_bucket: bro-tfstate
      tfstate_key: giftexchange/live
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  deploy-live:
    name: Deploy to live stage
    needs: build-infrastructure
    uses: ./.github/workflows/.reusable-deploy-api-gateway-stage.yml
    with:
      stage-name: live
      api-gateway-name: giftexchange-gateway
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
