name: _ deploy api gateway stage

on:
  workflow_call:
    inputs:
      stage-name:
        description: The API Gateway stage to deploy to
        required: true
        type: string
      api-gateway-name:
        description: The API Gateway name to deploy
        required: true
        type: string
      wait-for-propagation:
        description: Whether to wait for 120 seconds after deployment to allow it to propagate before the workflow completes
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-stage:
    name: Deploy ${{ inputs.stage-name }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy API Gateway to ${{ inputs.stage-name }} stage
        shell: bash
        run: |
          gateway_id=$(aws apigateway get-rest-apis \
            --query "items[?name=='${{ inputs.api-gateway-name }}'].id | [0]" \
            --output text)

          if [[ -z "$gateway_id" || "$gateway_id" == "None" ]]; then
            echo "ERROR: Could not find API Gateway with name '${{ inputs.api-gateway-name }}'" >&2
            exit 1
          fi
          echo "Found gateway with id: $gateway_id"

          deployment_id=$(aws apigateway create-deployment \
            --rest-api-id "$gateway_id" \
            --stage-name "${{ inputs.stage-name }}" \
            --description "Deployment for ${{ inputs.api-gateway-name }} from GitHub Actions run ${{ github.run_id }}" \
            --query id \
            --output text)
          echo "Created deployment with id: $deployment_id"

          echo "Updating ${{ inputs.stage-name }} stage to deployment $deployment_id..."
          aws apigateway update-stage \
            --rest-api-id "$gateway_id" \
            --stage-name "${{ inputs.stage-name }}" \
            --patch-operations op=replace,path=/deploymentId,value="$deployment_id"
          echo "${{ inputs.stage-name }} stage updated successfully."

      - name: Wait for deployment to propagate
        if: ${{ inputs.wait-for-propagation }}
        shell: bash
        run: |
          echo "Waiting 120 seconds for API Gateway deployment to propagate..."
          sleep 120
          echo "Done."

